<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#0c0e12" />
    <title>Orion Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0c0e12;
        color: #f4f6f8;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(560px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        background: #12151b;
        padding: 28px;
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.36);
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.15;
      }
      p {
        color: #aab2bf;
        line-height: 1.7;
      }
      a {
        color: #8fb0ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Orion is offline</h1>
      <p>
        The installed app shell is available. Reopen Chat, Documents, Models, or Settings from the app navigation once
        the cached route is restored.
      </p>
      <a href="/">Return to Orion</a>
    </main>
  </body>
</html>
