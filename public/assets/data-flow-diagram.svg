    <line x1="700" y1="195" x2="760" y2="195"/>
    <line x1="870" y1="240" x2="662" y2="330"/>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#43d78a"/></marker></defs>
