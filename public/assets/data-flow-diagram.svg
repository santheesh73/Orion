<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-label="Orion data flow diagram">
  <rect width="1100" height="520" fill="#0c0e12"/>
  <text x="60" y="70" fill="#f4f6f8" font-family="Arial, sans-serif" font-size="34" font-weight="700">Local Data Flow</text>
  <g fill="#12151b" stroke="#2b313c" stroke-width="2">
    <rect x="70" y="150" width="170" height="90" rx="14"/>
    <rect x="300" y="150" width="170" height="90" rx="14"/>
    <rect x="530" y="150" width="170" height="90" rx="14"/>
    <rect x="760" y="150" width="220" height="90" rx="14"/>
    <rect x="530" y="330" width="220" height="90" rx="14"/>
  </g>
  <g fill="#f4f6f8" font-family="Arial, sans-serif" font-size="17" font-weight="700">
