<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-label="Orion architecture diagram">
  <rect width="1100" height="620" fill="#0c0e12"/>
  <text x="60" y="70" fill="#f4f6f8" font-family="Arial, sans-serif" font-size="34" font-weight="700">Orion Architecture</text>
  <g fill="#12151b" stroke="#2b313c" stroke-width="2">
    <rect x="60" y="120" width="220" height="100" rx="14"/>
    <rect x="330" y="120" width="220" height="100" rx="14"/>
    <rect x="600" y="120" width="220" height="100" rx="14"/>
    <rect x="330" y="300" width="220" height="100" rx="14"/>
    <rect x="600" y="300" width="220" height="100" rx="14"/>
    <rect x="330" y="470" width="220" height="90" rx="14"/>
    <rect x="600" y="470" width="220" height="90" rx="14"/>
  </g>
  <g fill="#f4f6f8" font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <text x="112" y="176">Next.js UI</text>
    <text x="388" y="176">Hooks</text>
    <text x="658" y="176">Services</text>
    <text x="372" y="356">Workers</text>
    <text x="650" y="356">WebLLM</text>
    <text x="376" y="525">IndexedDB</text>
