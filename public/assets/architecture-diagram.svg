    <line x1="550" y1="170" x2="600" y2="170"/>
    <line x1="710" y1="220" x2="710" y2="300"/>
    <line x1="600" y1="350" x2="550" y2="350"/>
    <line x1="440" y1="400" x2="440" y2="470"/>
    <line x1="710" y1="400" x2="710" y2="470"/>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#5b8dff"/></marker></defs>
